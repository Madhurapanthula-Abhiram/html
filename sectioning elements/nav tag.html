<html>
    <head>
        <title>
            navigation tag
        </title>
    </head>
    <style>
        header{
            background-color: grey;
            color: white;
        }
        nav{
            background-color: lightgrey;
        }
        nav a{
            text-decoration: solid;
            padding:10px 35px;
            color:black ;
            display: inline-block;
            border-radius:8px;
            transition:color 0.15 ,background-color 0.15s;
            cursor:pointer;
        }
        nav a:hover{
            box-shadow: 5px 5px 10px rgba(0,0,0,0.25);
            background-color: grey;
            color:white;
            opacity:0.6;
        }
        nav a:active{
            opacity:0.8;
        }

    </style>
    <body>
        <header>
            <h3>IKART'S shopping</h3>
            <P>
                Welcomme shop what you want!..
            </P>
            <nav>
                <a href="#" >Home</a>
                <a href="#" >Sing up</a>
                <a href="#" >About Us</a>
                <a href="#" >Contact us</a>

            </nav>
        </header>
    </body>
</html>
