<html>
    <head>
        <title>
            aside tag
        </title>
    </head>
    <style>
        aside{
            font-family: calibri;
            background-color: grey;
            width: 250px;
            text-align: center;
            padding: 10px;
            height:100vh;
        }
        aside img{
            border-radius: 50%;
            padding-bottom: 10px;
        }
        aside a{
            display: block;
            text-decoration: solid;
            padding: 10px;
            color:white;
            font-weight: bold;
            font-size: 20px;
            border-radius: 8px;
            transition: 0.15sec;
        }
        aside a:hover{
            background-color: white;
            color: black;
           box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.25);
        }
        aside a:active{
            opacity:0.6;
        }

    </style>
    <body>
        <aside>
            <img src="C:\html\download.jpeg"  alt="user-image">
            <a href=#>Home</a>
            <a href=#>Education</a>
            <a href=#>Experience</a>
            <a href=#>About Us</a>
            <a href=#>Contact Us</a>

        </aside>
    </body>
    </html>
