<html>
    <head>
        <title>table 2 with all elememts</title>
    </head>
    <style>
        table,th,tr,td{
            border:2px solid black;
            text-align: center;

        }
        #one{
            background-color: greenyellow;
        }
        #two{
            background-color:black;
            color: white;
        }
    </style>
    <body>
        <table>
            <caption>Example</caption>
            <colgroup> 
            <col style="background-color: aqua;">
            <col style="background-color: rgb(235, 231, 10);">
            <col style="background-color: rgb(255, 64, 6);">

            </colgroup>
            <tr>
                <thead>
                    <th colspan="3" id="one">
                        Mobile Inventories Available At Hussain's Shopping!
                    </th>
                </thead>
            </tr>
            <tbody>
                <tr>
                    <th rowspan="2">Product Name</th>
                    <th colspan="2" id="two">Product Details</th>              
                </tr>
                <tr>
                    <th>Price</th>
                    <th>Description</th>
                </tr>
                <tr>
                    <td>Asus Zenfone</td>
                    <td>11599</td>
                    <td>an economical phone by asus</td>
                </tr>
                <tr>
                    <td>Redmi Note2</td>
                    <td>8599</td>
                    <td>an economical phone by Xiaomi</td>

                </tr>
            </tbody>
        </table>
    </body>
