<html>
    <head>
        <title>odered unordered description list</title>
    </head>
    <style>
        ol{
            background-color: grey;
            color: black;
        }
        ul{
            background-color: rgb(81, 199, 228);
            color: black;
        }
        dl{
            background-color: rgb(219, 233, 67);
            color: black;
        }
    </style>
    <body>
        <ol>
            <li>milk</li>
            <li>bread</li>
            <li>coffe-essentials</li>
            <ol>
                <li>sugar</li>
                <li>coffe power</li>
            </ol>
            <li>tea</li>
        </ol>
        <ul>
            <li>one</li>
            <li>two</li>
            <li>three</li>
        </ul>
        <dl>
            <dt>lion</dt>
            <dd>king of jungle</dd>
            <dt>tiger</dt>
            <dd>hero of jungle</dd>
        </dl>
    </body>
</html>
